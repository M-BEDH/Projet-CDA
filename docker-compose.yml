services:
  nginx:
    # image: nginx:latest
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "8080:80"  # hôte:conteneur → accessible depuis le navigateur   
    volumes:
      - ./backend:/var/www/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - app-network

  php:
    build:
      context: ./backend
      dockerfile: Dockerfile # Utilise le Dockerfile personnalisé pour installer les extensions nécessaires 
    container_name: php
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html # sync code local → conteneur (hot reload en dev, pas de rebuild nécessaire) 
    environment:
        DATABASE_URL: "mysql://asv_user:asv_user@mysql:3306/asv_db?serverVersion=8.0&charset=utf8mb4"
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql
    networks:
      - app-network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - app-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000" # hôte:conteneur → accessible depuis le navigateur
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      # - grafana-data:/var/lib/grafana 
      # pour éviter les problèmes de permissions sur Windows, on utilise un volume nommé au lieu d'un bind mount
    depends_on:
      - prometheus
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100" # port d'écoute du node-exporter pour Prometheus
    networks:
      - app-network

  mysqld-exporter:
    image: prom/mysqld-exporter
    container_name: mysqld-exporter
    ports:
      - "9104:9104" # port d'écoute du mysqld-exporter pour Prometheus
    command:
      - "--config.my-cnf=/etc/mysql/.my.cnf"
    volumes:
      - ./monitoring/mysqld-exporter/.my.cnf:/etc/mysql/.my.cnf:ro
    depends_on:
      - mysql
    networks:
      - app-network

  ###> symfony/mailer ###
  ### Non utilisé dans ce projet, mais prêt à être intégré si besoin (ex: notifications email aux clients) ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025"  # SMTP interne au conteneur → Symfony Mailer
      - "8025:8025"  # Interface web de Mailpit pour voir les emails envoyés
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1 # Accepte tous les identifiants SMTP (pas de rejet d'authentification)
      MP_SMTP_AUTH_ALLOW_INSECURE: 1 # Permet l'authentification même sans TLS (utile pour le développement local)
  ###< symfony/mailer ###

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8082:8080" # cAdvisor écoute sur 8080 à l'intérieur du conteneur, mais on le mappe sur 8082 de l'hôte pour éviter les conflits avec nginx
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - app-network

volumes:
  mysql-data:
  # grafana-data: # volume nommé non utilisé
  # les dashboards et datasources sont provisionnés via bind mount (./monitoring/grafana/provisioning)
  # Les données internes Grafana (sessions, préférences) ne sont pas persistées.
  # Si besoin en production, décommenter grafana-data ici et dans le service grafana (volumes - ligne : 74) pour éviter les problèmes de permissions Windows.

networks:
  app-network: # réseau personnalisé pour isoler les services de l'application et faciliter la communication inter-conteneurs
